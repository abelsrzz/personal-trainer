stages:
  - test
  - deploy

test:
  stage: test
  image: python:3.13-slim
  variables:
    PYTHON_BIN: python3
    CI_VENV: .venv-ci
    PYTHONPATH: "."
  before_script:
    - 'if command -v python >/dev/null 2>&1; then export PYTHON_BIN=python; fi'
    - '$PYTHON_BIN -m venv "$CI_VENV"'
    - '. "$CI_VENV/bin/activate"'
    - 'python -m pip install --quiet --upgrade pip'
    - 'python -m pip install --quiet -r requirements.txt pytest'
  script:
    - '. "$CI_VENV/bin/activate" && python -m pytest -q'
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy_main:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash openssh-client rsync python3
  script:
    - bash deploy/gitlab/deploy_via_ssh.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
