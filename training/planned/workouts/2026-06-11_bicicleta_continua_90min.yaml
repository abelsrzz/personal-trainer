      max_bpm: 138
  - order: 2
    step_type: interval
    description: 70 min Z2 estable
    duration_s: 4200
    target:
      type: heart_rate_range
      min_bpm: 130
      max_bpm: 148
  - order: 3
    step_type: cooldown
    description: 10 min suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 115
      max_bpm: 135
  primary_goal: Base aerobica
