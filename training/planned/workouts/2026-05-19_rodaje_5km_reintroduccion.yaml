workout:
  name: Bicicleta aerobica estable 65 min
  schedule_date: 2026-05-19
  sport: cycling
  description: Carga aerobica equivalente al rodaje previsto, sin impacto y con trabajo
    continuo de base.
  estimated_duration_s: 3900
  steps:
  - order: 1
    step_type: warmup
    description: 10 min suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 120
      max_bpm: 138
  - order: 2
    step_type: interval
    description: 45 min Z2 estable
    duration_s: 2700
    target:
      type: heart_rate_range
      min_bpm: 130
      max_bpm: 148
  - order: 3
    step_type: cooldown
    description: 10 min suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 115
      max_bpm: 135
  primary_goal: Base aerobica
