library:
  purpose: "Reusable workout patterns for the 10k build. Convert to dated workout YAML before uploading to Garmin."
  rules:
    - Use heart rate for easy work and pace only for quality blocks.
    - Do not use final 3:30/km pace unless goal gates support it.
    - Remove strides or fast blocks if shin pain is above 2/10.
  templates:
    easy_recovery:
      name: "Rodaje recuperacion"
      sport: running
      use_when: "After quality, race, poor sleep or yellow/red coach decision."
      structure: "30-45 min easy, 131-145 bpm."
    easy_plus_strides:
      name: "Rodaje facil + rectas"
      sport: running
      use_when: "Green status, shin quiet, neuromuscular touch needed."
      structure: "35-50 min easy + 4-8 x 12-20 s relaxed strides."
    aerobic_steady:
      name: "Aerobico sostenido"
      sport: running
      use_when: "Base block or secondary stimulus."
      structure: "15-25 min easy + 20-40 min steady under threshold + cool down."
    cruise_intervals:
      name: "Cruise intervals"
      sport: running
      use_when: "Threshold block, controlled sustainable work."
      structure: "2 km easy + 4-6 x 1000 m controlled threshold / 60-90 s jog + cool down."
    long_run:
      name: "Tirada larga controlada"
      sport: running
      use_when: "Sunday anchor if shin and recovery are stable."
      structure: "10-16 km Z1-Z2, no fast finish unless green and fresh."
    specific_10k_reps:
      name: "Repeticiones especificas 10k"
      sport: running
      use_when: "Specific block after checkpoint pace is defined."
      structure: "2 km easy + 3-5 x 1600 m at current 10k effort / 2 min jog + cool down."
    race_activation:
      name: "Activacion pre-carrera"
      sport: running
      use_when: "48-72 h before tune-up or S race."
      structure: "25-35 min easy + 3-5 short rhythm blocks + relaxed strides."
