workout:
  name: Eliptica larga comoda 100 min
  schedule_date: 2026-06-01
  sport: elliptical
  description: Sesion larga, comoda y continua en eliptica para mantener la carga aerobica equivalente sin impacto en un dia de alergia.
  estimated_duration_s: 6000
  steps:
  - order: 1
    step_type: warmup
    description: 10 min suaves en eliptica
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 120
      max_bpm: 138
  - order: 2
    step_type: interval
    description: 80 min Z2 baja y continua en eliptica
    duration_s: 4800
    target:
      type: heart_rate_range
      min_bpm: 145
      max_bpm: 155
  - order: 3
    step_type: cooldown
    description: 10 min suaves en eliptica
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 115
      max_bpm: 135
  primary_goal: Base aerobica
