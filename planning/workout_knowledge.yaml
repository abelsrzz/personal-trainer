workout_knowledge:
  pace_legend:
    E: facil / conversacional / Z1-Z2
    M: ritmo maraton
    HM: ritmo medio maraton
    K10: ritmo competicion 10 km
    K5: ritmo competicion 5 km
    K3_1500: ritmo rapido, VO2max o capacidad anaerobica
    R: repeticiones muy rapidas, tecnica, economia, velocidad
    REC: recuperacion trotando o parado segun objetivo

  standard_goals:
    - recuperacion
    - base_aerobica
    - resistencia_aerobica
    - eficiencia_aerobica
    - fondo_largo
    - stamina
    - umbral_aerobico
    - umbral_lactico
    - umbral_fraccionado
    - ritmo_maraton
    - resistencia_especifica_maraton
    - ritmo_medio_maraton
    - resistencia_especifica_21k
    - ritmo_10k
    - resistencia_especifica_10k
    - ritmo_5k
    - vo2max
    - potencia_aerobica
    - velocidad_aerobica
    - economia_de_carrera
    - tecnica
    - strides_progresivos
    - fuerza_especifica
    - cuestas_cortas
    - cuestas_largas
    - capacidad_anaerobica
    - tolerancia_al_lactato
    - velocidad_resistencia
    - activacion_precompetitiva
    - test_de_forma
    - trail_montana
    - ultra_tiempo_en_pies

  safety_rules:
    - No programar mas de 2 sesiones duras por semana en corredores populares.
    - Separar VO2max, series fuertes, cuestas duras y tiradas largas exigentes por 48h si es posible.
    - Subir volumen o intensidad, no ambas a la vez.
    - Mantener la mayoria del volumen en facil/Z2.
    - Ajustar por nivel: principiante reduce repeticiones un 30-50%; avanzado puede aumentar volumen, no necesariamente ritmo.
    - Cada sesion dura deberia incluir calentamiento 15-25' + tecnica/strides + enfriamiento 10-20'.
    - Si hay dolor que cambia la pisada, fatiga inusual o pulsaciones anomalas, cambiar por rodaje suave o descanso.

