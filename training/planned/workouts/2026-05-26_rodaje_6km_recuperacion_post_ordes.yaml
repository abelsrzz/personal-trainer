workout:
  name: Bicicleta recuperacion post-Ordes 50 min
  schedule_date: 2026-05-26
  sport: fitness_equipment
  description: Carga muy controlada para absorber Ordes, mover sangre y recuperar sin
    impacto.
  estimated_duration_s: 3000
  steps:
  - order: 1
    step_type: warmup
    description: 10 min muy suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 115
      max_bpm: 135
  - order: 2
    step_type: interval
    description: 30 min Z1-Z2 baja
    duration_s: 1800
    target:
      type: heart_rate_range
      min_bpm: 125
      max_bpm: 142
  - order: 3
    step_type: cooldown
    description: 10 min suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 115
      max_bpm: 132
  primary_goal: Recuperacion
