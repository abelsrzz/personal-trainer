workout:
  name: Calentamiento pre-5K El Canario
  schedule_date: 2026-06-28
  sport: running
  description: Calentamiento corto antes del 5K para activar sin pasarse, pero sin limitar la carrera a pulsos de rodaje.
  estimated_duration_s: 900
  steps:
  - order: 1
    step_type: warmup
    description: 8 min trote suave
    duration_s: 480
    target:
      type: heart_rate_range
      min_bpm: 135
      max_bpm: 155
  - order: 2
    type: repeat_group
    iterations: 3
    steps:
    - order: 3
      step_type: interval
      description: Recta 20 s controlada
      duration_s: 20
    - order: 4
      step_type: recovery
      description: 40 s muy suave caminando o trotando
      duration_s: 40
  - order: 5
    step_type: cooldown
    description: 2 min faciles hasta la salida
    duration_s: 120
    target:
      type: heart_rate_range
      min_bpm: 130
      max_bpm: 155
  primary_goal: Activacion
