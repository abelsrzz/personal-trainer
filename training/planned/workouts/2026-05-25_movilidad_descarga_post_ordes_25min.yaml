workout:
  name: Movilidad descarga post-Ordes 25 min
  schedule_date: 2026-05-25
  sport: mobility
  description: Sesion suave de movilidad para descargar gemelo, soleo, tobillo y cadera tras la carrera de Ordes.
  estimated_duration_s: 1500
  steps:
  - order: 1
    step_type: warmup
    description: Respiracion, movilidad suave y circulos de tobillo
    duration_s: 180
  - order: 2
    type: repeat_group
    iterations: 2
    steps:
    - order: 3
      step_type: interval
      description: Circulos de tobillo y movilidad de tobillo · 45 s por lado
      duration_s: 90
    - order: 4
      step_type: interval
      description: Sentadilla asistida profunda · 8 repeticiones controladas
      repetitions: 8
  - order: 3
    type: repeat_group
    iterations: 2
    steps:
    - order: 5
      step_type: interval
      description: Glute bridge suave · 10 repeticiones
      repetitions: 10
    - order: 6
      step_type: interval
      description: Movilidad activa de isquios · 8 repeticiones por lado
      repetitions: 8
  - order: 4
    type: repeat_group
    iterations: 2
    steps:
    - order: 7
      step_type: interval
      description: Soleo y gemelo en rango comodo · 12 repeticiones
      repetitions: 12
    - order: 8
      step_type: interval
      description: Side plank suave · 25 s por lado
      duration_s: 25
  - order: 5
    step_type: cooldown
    description: Estiramientos finales y descarga respiratoria
    duration_s: 240
