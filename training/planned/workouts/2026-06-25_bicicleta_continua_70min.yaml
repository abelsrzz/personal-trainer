  sport: cycling
  description: Soporte aerobico continuo en bici para sumar carga sin aumentar el coste de impacto antes del 5K.
  estimated_duration_s: 4200
  steps:
  - order: 1
    step_type: warmup
    description: 10 min suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 120
      max_bpm: 138
  - order: 2
    step_type: interval
    description: 50 min Z2 estable
    duration_s: 3000
    target:
      type: heart_rate_range
      min_bpm: 145
      max_bpm: 155
  - order: 3
    step_type: cooldown
    description: 10 min suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 115
      max_bpm: 135
  primary_goal: Base aerobica
