stages:
  - test
  - deploy

# Run the test suite before deploying so a red suite blocks the deployment.
# NOTE: the deselected tests below are PRE-EXISTING failures (data/heuristic
# drift) that predate the CI gate. They are excluded so the gate catches *new*
# regressions without blocking deploys on known-broken tests. Remove a deselect
# as each underlying test is fixed.
test:
  stage: test
  image: python:3.13-slim
  before_script:
    - python -m pip install --quiet --upgrade pip
    - pip install --quiet -r requirements.txt pytest
  script:
    - >-
      python -m pytest -q
      --deselect tests/test_load_progression.py::LoadProgressionTests::test_progression_window_uses_last_absorbed_week
      --deselect "tests/test_sync_garmin.py::GarminSyncTests::test_import_activities_fetches_multiple_pages_until_older_entries"
      --deselect tests/test_workout_knowledge.py::WorkoutKnowledgeTests::test_shared_matcher_derives_primary_goal_for_controlled_quality
      --deselect tests/test_workout_knowledge.py::WorkoutKnowledgeTests::test_shared_matcher_returns_semantic_summary
      --deselect tests/test_workout_knowledge.py::WorkoutKnowledgeTests::test_template_id_mapping_has_priority_over_text_heuristic
      --deselect tests/test_workout_knowledge.py::WorkoutKnowledgeTests::test_workout_knowledge_matches_specific_10k_session
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy_main:
  stage: deploy
  script:
    - bash deploy/gitlab/deploy_via_ssh.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
