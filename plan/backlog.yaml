phases:
  - id: phase_1_daily_loop
    title: Close the daily loop
    goal: Let the athlete report status, talk to the system, and execute the day from the web.
    items:
      - id: web_chat
        title: Add /chat web interface backed by OpenCodeBridge
        priority: P0
        status: pending
        impact: high
        effort: medium
        depends_on: []
      - id: daily_checkin
        title: Add fast daily check-in
        priority: P0
        status: pending
        impact: high
        effort: medium
        depends_on: []
      - id: replanning_from_web
        title: Add real replanning from the web
        priority: P0
        status: pending
        impact: high
        effort: high
        depends_on:
          - daily_checkin
      - id: actionable_week
        title: Make the weekly view actionable
        priority: P1
        status: pending
        impact: high
        effort: medium
        depends_on:
          - replanning_from_web

  - id: phase_2_operational_control
    title: Make control visible
    goal: Explain plan execution, current decision, and injury risk in one place.
    items:
      - id: plan_vs_reality
        title: Add plan vs reality analytics
        priority: P1
        status: pending
        impact: high
        effort: medium
        depends_on:
          - actionable_week
      - id: coach_decision_center
        title: Build coach decision center
        priority: P1
        status: pending
        impact: high
        effort: medium
        depends_on:
          - plan_vs_reality
      - id: risk_tracking
        title: Build injury and risk tracking view
        priority: P1
        status: pending
        impact: high
        effort: medium
        depends_on:
          - daily_checkin

  - id: phase_3_sport_intelligence
    title: Raise sports intelligence
    goal: Improve progress visibility and race preparation.
    items:
      - id: progress_insights
        title: Add real progress insights
        priority: P2
        status: pending
        impact: medium
        effort: high
        depends_on:
          - plan_vs_reality
      - id: race_preparation
        title: Add race preparation flow
        priority: P2
        status: pending
        impact: medium
        effort: medium
        depends_on:
          - progress_insights
          - fueling_hydration
      - id: fueling_hydration
        title: Add competition and hard-session fueling-hydration engine
        priority: P1
        status: pending
        impact: high
        effort: high
        depends_on:
          - actionable_week
