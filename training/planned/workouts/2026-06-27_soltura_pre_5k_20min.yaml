workout:
  name: Soltura pre-5K 20 min
  schedule_date: 2026-06-27
  sport: elliptical
  description: Soltura muy suave para llegar con piernas despiertas a la carrera sin sumar impacto ni fatiga residual.
  estimated_duration_s: 1200
  steps:
  - order: 1
    step_type: warmup
    description: 5 min muy suaves
    duration_s: 300
    target:
      type: heart_rate_range
      min_bpm: 115
      max_bpm: 130
  - order: 2
    step_type: interval
    description: 10 min fluidos y muy faciles
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 120
      max_bpm: 136
  - order: 3
    step_type: cooldown
    description: 5 min muy suaves para soltar
    duration_s: 300
    target:
      type: heart_rate_range
      min_bpm: 115
      max_bpm: 128
  primary_goal: Recuperacion
