workout:
  name: Bicicleta larga cierre 125 min
  schedule_date: 2026-06-14
  sport: cycling
  description: Cierre de la rehabilitacion sin impacto con trabajo largo, comodo y en Z2 de base aerobica.
  estimated_duration_s: 7500
  steps:
  - order: 1
    step_type: warmup
    description: 10 min suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 120
      max_bpm: 138
  - order: 2
    step_type: interval
    description: 105 min Z2 baja y conversacional
    duration_s: 6300
    target:
      type: heart_rate_range
      min_bpm: 128
      max_bpm: 145
  - order: 3
    step_type: cooldown
    description: 10 min suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 115
      max_bpm: 135
  primary_goal: Base aerobica
