meta:
  product: RunPilot
  owner: local
  last_reviewed: 2026-05-11
  rule: only_one_task_in_progress

phases:
  - id: phase_01_daily_action
    title: Decision diaria y accion inmediata
    goal: Hacer que el usuario sepa que hacer hoy y pueda actuar desde la web.
    status: completed
    items:
      - id: RP-01
        title: Definir el bloque principal Plan de hoy
        status: completed
        priority: high
        impact: high
        effort: medium
        depends_on: []
        definition_of_done:
          - Existe especificacion UX y de datos del bloque Plan de hoy.
          - Define version ideal, corta y protectora.
          - Define fuentes del dato y estados vacios.
        suggested_files:
          - web/templates/index.html
          - web/templates/dashboard.html
          - scripts/web/app.py
        outputs:
          - plan/spec_rp_01_plan_de_hoy.md
      - id: RP-02
        title: Implementar CTA operativos en la sesion del dia
        status: completed
        priority: high
        impact: high
        effort: medium
        depends_on: [RP-01]
        definition_of_done:
          - El usuario puede marcar hecha, no hecha o pedir alternativa.
          - Queda registrada una accion local coherente.
        suggested_files:
          - web/templates/planned_workout_detail.html
          - web/templates/calendar_day.html
          - scripts/web/app.py
      - id: RP-03
        title: Implementar reenvio a Garmin y reintentos visibles
        status: completed
        priority: medium
        impact: medium
        effort: medium
        depends_on: [RP-02]
        definition_of_done:
          - Existe accion visible para reintentar subida.
          - El resultado queda reflejado en UI.
        suggested_files:
          - scripts/garmin/sync_garmin.py
          - scripts/web/app.py

  - id: phase_02_feedback_loop
    title: Feedback post-entreno y aprendizaje
    goal: Cerrar el ciclo entre ejecucion, sensaciones y decision futura.
    status: completed
    items:
      - id: RP-04
        title: Definir captura rapida de feedback post-entreno
        status: completed
        priority: high
        impact: high
        effort: low
        depends_on: []
        definition_of_done:
          - Se define un formulario minimo con RPE, dolor, cumplimiento y nota.
          - Existe formato de almacenamiento local.
        suggested_files:
          - athlete/
          - training/
          - scripts/web/app.py
        outputs:
          - plan/spec_rp_04_feedback_post_entreno.md
      - id: RP-05
        title: Implementar formulario y persistencia de feedback
        status: completed
        priority: high
        impact: high
        effort: medium
        depends_on: [RP-04]
        definition_of_done:
          - El feedback se puede introducir desde la web.
          - El dato queda disponible para decision y dashboard.
        suggested_files:
          - web/templates/completed_workout_detail.html
          - web/templates/calendar_day.html
          - scripts/web/app.py
      - id: RP-06
        title: Exponer patrones basicos de respuesta del atleta
        status: completed
        priority: medium
        impact: high
        effort: medium
        depends_on: [RP-05]
        definition_of_done:
          - Dashboard muestra patrones simples accionables.
          - Las reglas derivadas son legibles.
        suggested_files:
          - web/templates/dashboard.html
          - scripts/web/app.py

  - id: phase_03_adaptive_engine
    title: Adaptacion visible y proteccion
    goal: Hacer evidente cuando el sistema adapta el plan por contexto.
    status: completed
    items:
      - id: RP-07
        title: Definir triggers de adaptacion visibles
        status: completed
        priority: high
        impact: high
        effort: medium
        depends_on: []
        definition_of_done:
          - Estan definidos triggers de fatiga, dolor, tiempo y ejecucion.
          - Existe mapa trigger -> cambio de plan.
        suggested_files:
          - web/templates/dashboard.html
          - scripts/web/app.py
      - id: RP-08
        title: Mostrar replanificacion en semana y calendario
        status: completed
        priority: high
        impact: high
        effort: medium
        depends_on: [RP-07]
        definition_of_done:
          - La UI distingue sesiones originales y ajustadas.
          - Se ve causa y momento del ajuste.
        suggested_files:
          - web/templates/planned_workouts.html
          - web/templates/calendar_day.html
          - scripts/web/app.py
      - id: RP-09
        title: Implementar modo lesion o retorno
        status: completed
        priority: high
        impact: high
        effort: high
        depends_on: [RP-07]
        definition_of_done:
          - Existe estado de proteccion activable.
          - Cambia guidance y progreso permitido.
        suggested_files:
          - athlete/
          - planning/
          - web/templates/dashboard.html
          - scripts/web/app.py

  - id: phase_04_readiness_calendar
    title: Readiness y calendario premium
    goal: Mejorar legibilidad operativa diaria y semanal.
    status: completed
    items:
      - id: RP-10
        title: Consolidar tarjeta de readiness diaria
        status: completed
        priority: high
        impact: medium
        effort: medium
        depends_on: []
        definition_of_done:
          - Existe tarjeta clara con estado fresco, neutro o protegido.
          - Traduce metricas Garmin a accion.
        suggested_files:
          - web/templates/dashboard.html
          - web/templates/index.html
          - scripts/web/app.py
      - id: RP-11
        title: Soportar multiples eventos por dia en calendario
        status: completed
        priority: medium
        impact: high
        effort: high
        depends_on: []
        definition_of_done:
          - El mes muestra mas de un evento por dia cuando aplica.
          - No se pierde el acceso al detalle.
        suggested_files:
          - web/templates/planned_workouts.html
          - web/static/style.css
          - scripts/web/app.py
      - id: RP-12
        title: Comparar plan vs ejecucion por dia
        status: completed
        priority: medium
        impact: high
        effort: medium
        depends_on: [RP-11]
        definition_of_done:
          - El usuario ve diferencia entre lo prescrito y lo hecho.
        suggested_files:
          - web/templates/calendar_day.html
          - scripts/web/app.py

  - id: phase_05_onboarding_and_progress
    title: Onboarding y progreso comprensible
    goal: Empaquetar mejor la experiencia y hacerla reusable.
    status: completed
    items:
      - id: RP-13
        title: Definir onboarding guiado
        status: completed
        priority: medium
        impact: medium
        effort: medium
        depends_on: []
        definition_of_done:
          - Existe flujo definido de setup del atleta y objetivo.
        suggested_files:
          - athlete/
          - races/
          - web/templates/onboarding.html
          - scripts/web/app.py
        outputs:
          - plan/spec_rp_13_onboarding_guiado.md
      - id: RP-14
        title: Implementar vista de progreso contra objetivo
        status: completed
        priority: medium
        impact: medium
        effort: medium
        depends_on: []
        definition_of_done:
          - Hay resumen de progreso claro y no tecnico.
        suggested_files:
          - web/templates/progress.html
          - web/templates/index.html
          - web/templates/base.html
          - scripts/web/app.py

  - id: phase_06_automation_mastery
    title: Automatizacion total del sistema
    goal: Hacer que cada entrenamiento completado regenere automaticamente todo el estado derivado afectado.
    status: in_progress
    items:
      - id: AP-01
        title: Definir capability unica de post-entreno
        status: completed
        priority: high
        impact: high
        effort: medium
        depends_on: []
        definition_of_done:
          - Existe contrato claro de `post_workout_refresh`.
          - Estan listados triggers, entradas, salidas y artefactos derivados.
        suggested_files:
          - system/capabilities/registry.yaml
          - scripts/garmin/
          - plan/spec_automation_mastery_plan.md
        outputs:
          - plan/spec_ap_01_post_workout_refresh.md
      - id: AP-02
        title: Automatizar deteccion de actividades nuevas
        status: completed
        priority: high
        impact: high
        effort: high
        depends_on: [AP-01]
        definition_of_done:
          - Existe trigger automatico local sin comando manual.
          - El sistema detecta actividad nueva y arranca el pipeline.
        suggested_files:
          - scripts/garmin/
          - deploy/systemd/
          - system/state/
      - id: AP-03
        title: Encadenar import, review, decision y progreso por evento
        status: completed
        priority: high
        impact: high
        effort: high
        depends_on: [AP-02]
        definition_of_done:
          - Una actividad nueva actualiza automaticamente review, coach decision, dashboard y progreso.
          - El flujo es idempotente.
        suggested_files:
          - scripts/garmin/coach_sync.py
          - scripts/garmin/review_planned_session.py
          - scripts/garmin/coach_engine.py
          - scripts/garmin/post_workout_refresh.py
      - id: AP-04
        title: Integrar feedback subjetivo en el motor automatico
        status: completed
        priority: high
        impact: high
        effort: medium
        depends_on: [AP-03]
        definition_of_done:
          - El feedback guardado afecta automaticamente decision, proteccion y progreso.
        suggested_files:
          - scripts/garmin/coach_engine.py
          - training/completed/feedback/
          - scripts/garmin/post_workout_refresh.py
      - id: AP-05
        title: Actualizar lesion y retorno automaticamente
        status: completed
        priority: high
        impact: high
        effort: medium
        depends_on: [AP-04]
        definition_of_done:
          - El sistema puede promover senales de dolor a estado estructurado de lesion/retorno.
          - `shin_tracker` deja de depender solo de escritura manual.
        suggested_files:
          - athlete/shin_tracker.yaml
          - scripts/garmin/coach_engine.py
          - scripts/garmin/post_workout_refresh.py
      - id: AP-06
        title: Añadir observabilidad y salud del pipeline automatico
        status: completed
        priority: medium
        impact: high
        effort: medium
        depends_on: [AP-03]
        definition_of_done:
          - Se ve ultimo procesamiento correcto, errores y reintentos.
          - El sistema deja trazabilidad por actividad.
        suggested_files:
          - system/state/
          - web/templates/
          - scripts/garmin/
          - scripts/web/app.py
