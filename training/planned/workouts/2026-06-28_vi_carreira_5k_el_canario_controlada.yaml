workout:
  name: VI Carreira 5K El Canario controlada
  schedule_date: 2026-06-28
  sport: running
  description: 5K de referencia corrido con progresion competitiva. El objetivo es obtener una lectura util del momento actual sin limitar artificialmente el esfuerzo si la tibia responde limpia.
  estimated_duration_s: 1320
  steps:
  - order: 1
    step_type: interval
    description: Km 1 firme pero controlado para colocarse bien sin salir pasado
    distance_m: 1000
    target:
      type: pace_range
      min_pace: 4:55/km
      max_pace: 4:50/km
  - order: 2
    step_type: interval
    description: Km 2-3 progresivos si todo va limpio
    distance_m: 2000
    target:
      type: pace_range
      min_pace: 4:45/km
      max_pace: 4:40/km
  - order: 3
    step_type: interval
    description: Km 4 apretar con control si la tecnica sigue limpia
    distance_m: 1000
    target:
      type: pace_range
      min_pace: 4:40/km
      max_pace: 4:35/km
  - order: 4
    step_type: interval
    description: Ultimo km por sensacion competitiva, sin sprint largo
    distance_m: 1000
    target:
      type: pace_range
      min_pace: 4:35/km
      max_pace: 4:25/km
  primary_goal: Test de rendimiento
