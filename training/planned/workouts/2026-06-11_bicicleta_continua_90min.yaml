workout:
  name: Bicicleta continua controlada 80 min
  schedule_date: 2026-06-11
  sport: cycling
  description: Trabajo aerobico continuo y prudente en Z2 para cerrar la semana sin sumar tension extra antes de la reintroduccion.
  estimated_duration_s: 4800
  steps:
  - order: 1
    step_type: warmup
    description: 10 min suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 120
      max_bpm: 138
  - order: 2
    step_type: interval
    description: 60 min Z2 estable y continua
    duration_s: 3600
    target:
      type: heart_rate_range
      min_bpm: 145
      max_bpm: 155
  - order: 3
    step_type: cooldown
    description: 10 min suaves
    duration_s: 600
    target:
      type: heart_rate_range
      min_bpm: 115
      max_bpm: 135
  primary_goal: Base aerobica
